version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saascolegio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: saascolegio
      POSTGRES_PASSWORD: saascolegio_dev
      POSTGRES_DB: saascolegio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U saascolegio']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saascolegio_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
